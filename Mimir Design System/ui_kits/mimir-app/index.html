<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Mimir — UI kit</title>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+Runic&display=swap"/>
<link rel="stylesheet" href="app.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Sidebar.jsx"></script>
<script type="text/babel" src="TopBar.jsx"></script>
<script type="text/babel" src="EntryCard.jsx"></script>
<script type="text/babel" src="LibraryBrowser.jsx"></script>
<script type="text/babel" src="EntryView.jsx"></script>
<script type="text/babel" src="CommandPalette.jsx"></script>
<script type="text/babel" src="Timeline.jsx"></script>
<script type="text/babel" src="FamilyTree.jsx"></script>
<script type="text/babel" src="GenusTree.jsx"></script>
<script type="text/babel" src="FactionTree.jsx"></script>
<script type="text/babel" src="RelationshipsWeb.jsx"></script>
<script type="text/babel" src="ConnectionsGraph.jsx"></script>
<script type="text/babel" src="ValidationView.jsx"></script>
<script type="text/babel" src="SchemasView.jsx"></script>
<script type="text/babel" src="TranslatorView.jsx"></script>
<script type="text/babel" src="CalendarView.jsx"></script>
<script type="text/babel" src="WellScene.jsx"></script>
<script type="text/babel" src="AskMimirSanctum.jsx"></script>
<script type="text/babel" src="ExportEngine.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [view, setView] = useState("library"); // library | entry | timeline | tree | validation | ask | export
  const [openEntry, setOpenEntry] = useState(null);
  const [cmd, setCmd] = useState(false);
  const [filter, setFilter] = useState("characters");

  useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === "k") { e.preventDefault(); setCmd(c => !c); }
      if (e.key === "Escape") { setCmd(false); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  // === Ask Mimir = FULLSCREEN takeover (no sidebar, no topbar) =====
  if (view === "ask") {
    return (
      <div className="mim-app mim-app-fullscreen" data-screen-label="06 Ask Mimir">
        <button className="ask-exit" onClick={() => { setView("library"); setFilter("characters"); }}>
          ← Leave the well
        </button>
        <AskMimirSanctum/>
        <CommandPalette open={cmd} onClose={() => setCmd(false)} onPick={() => setCmd(false)}/>
      </div>
    );
  }

  const breadcrumbs = view === "library"
    ? ["Shieldwall Saga", "Library", "Characters"]
    : view === "timeline"
      ? ["Shieldwall Saga", "Tools", "Timeline"]
    : view === "tree"
      ? ["Shieldwall Saga", "Tools", "Family tree"]
    : view === "validation"
      ? ["Shieldwall Saga", "Tools", "Validation"]
    : view === "schemas"
      ? ["Shieldwall Saga", "Tools", "Schemas"]
    : view === "translator"
      ? ["Shieldwall Saga", "Tools", "Translator"]
    : view === "calendar"
      ? ["Shieldwall Saga", "Tools", "Calendar"]
    : view === "genus"
      ? ["Shieldwall Saga", "Tools", "Genus tree"]
    : view === "factiontree"
      ? ["Shieldwall Saga", "Tools", "Faction tree"]
    : view === "relationships"
      ? ["Shieldwall Saga", "Tools", "Connections (3D)"]
    : view === "export"
      ? ["Shieldwall Saga", "Tools", "Export to engine"]
    : ["Shieldwall Saga", "Library", "Characters", openEntry?.name];

  const screenLabel = view === "library" ? "01 Library"
                    : view === "entry"   ? "02 Entry view"
                    : view === "timeline"? "03 Timeline"
                    : view === "tree"    ? "04 Family tree"
                    : view === "validation" ? "08 Validation"
                    : view === "schemas" ? "09 Schemas"
                    : view === "translator" ? "10 Translator"
                    : view === "calendar" ? "11 Calendar"
                    : view === "genus" ? "12 Genus tree"
                    : view === "factiontree" ? "13 Faction tree"
                    : view === "relationships" ? "14 Connections (3D)"
                    : view === "export"  ? "07 Export to engine"
                    : "05";

  return (
    <div className="mim-app" data-screen-label={screenLabel}>
      <Sidebar
        active={view === "timeline" ? "timeline" : view === "tree" ? "tree" : view === "validation" ? "validation" : view === "schemas" ? "schemas" : view === "translator" ? "translator" : view === "calendar" ? "calendar" : view === "genus" ? "genus" : view === "factiontree" ? "factiontree" : view === "relationships" ? "relationships" : view === "export" ? "export" : filter}
        onNav={(id) => {
          setOpenEntry(null);
          if (id === "timeline") { setView("timeline"); return; }
          if (id === "tree")     { setView("tree");     return; }
          if (id === "validation") { setView("validation"); return; }
          if (id === "schemas")    { setView("schemas");    return; }
          if (id === "translator") { setView("translator"); return; }
          if (id === "calendar")   { setView("calendar");   return; }
          if (id === "genus")      { setView("genus");      return; }
          if (id === "factiontree"){ setView("factiontree"); return; }
          if (id === "relationships"){ setView("relationships"); return; }
          if (id === "ask")      { setView("ask");      return; }
          if (id === "export")   { setView("export");   return; }
          setView("library"); setFilter(id);
        }}
      />
      <main className="mim-main">
        <TopBar breadcrumbs={breadcrumbs} onCommand={() => setCmd(true)}/>
        <div className="mim-content">
          {view === "library" && (
            <LibraryBrowser
              activeFilter={filter}
              onFilter={setFilter}
              onOpenEntry={(e) => { setOpenEntry(e); setView("entry"); }}
              focusedId={null}
            />
          )}
          {view === "entry" && openEntry && (
            <EntryView
              entry={openEntry}
              onClose={() => { setView("library"); setOpenEntry(null); }}
              onAsk={() => setView("ask")}
            />
          )}
          {view === "timeline" && <Timeline/>}
          {view === "tree" && <FamilyTree/>}
          {view === "validation" && <ValidationView onOpenEntry={() => {}}/>}
          {view === "schemas" && <SchemasView/>}
          {view === "translator" && <TranslatorView/>}
          {view === "calendar" && <CalendarView/>}
          {view === "genus" && <GenusTree/>}
          {view === "factiontree" && <FactionTree/>}
          {view === "relationships" && <ConnectionsGraph/>}
          {view === "export" && <ExportEngine/>}
        </div>
      </main>
      <CommandPalette open={cmd} onClose={() => setCmd(false)} onPick={() => setCmd(false)}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

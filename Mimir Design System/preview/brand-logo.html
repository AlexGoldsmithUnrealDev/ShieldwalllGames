<!doctype html>
<!-- @dsCard group="Brand" name="Brand — Logo" subtitle="Mimir mark + wordmark in Njord" viewport="700x210" -->
<html lang="en"><head><meta charset="utf-8"/><title>Brand · logo</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
html,body{margin:0;padding:0;background:var(--bg-page);color:var(--fg-1)}
.f{
  padding:22px;background:var(--bg-shell);
  border:1px solid var(--border);border-radius:10px;
  position:relative;overflow:hidden;display:flex;align-items:stretch;gap:32px;
  min-height: 360px;
}
.f::before{content:"";position:absolute;inset:0;background-image:var(--grain-svg);background-size:220px;opacity:.5;mix-blend-mode:overlay;pointer-events:none}

/* Mark stage — well floats low, smoke rises from inside */
.stage{
  width: 220px; flex-shrink:0;
  position: relative;
  border-radius: 8px;
  overflow: hidden;
  background:
    radial-gradient(ellipse 60% 40% at 50% 95%, rgba(184,90,44,0.22), transparent 70%),
    radial-gradient(ellipse 80% 50% at 50% 110%, rgba(122,31,43,0.35), transparent 75%),
    linear-gradient(180deg, #0e0b09 0%, #14100d 60%, #1a1410 100%);
  border: 1px solid rgba(214,201,168,0.08);
}
.stage::after{
  content:"";position:absolute;inset:0;
  background-image:var(--grain-svg);background-size:220px;
  opacity:.55;mix-blend-mode:overlay;pointer-events:none;
}

/* Subtle ground glow under the well */
.glow{
  position:absolute; left:50%; bottom:18%;
  width: 160px; height: 28px;
  transform: translateX(-50%);
  background: radial-gradient(ellipse, rgba(184,90,44,0.45), transparent 70%);
  filter: blur(8px);
  z-index: 1;
}

/* The well — floats low in the stage, with a soft float animation */
.well{
  position:absolute; left:50%; bottom:14%;
  width: 130px; transform: translateX(-50%);
  z-index: 2;
  filter:
    drop-shadow(0 14px 18px rgba(0,0,0,0.65))
    drop-shadow(0 0 22px rgba(184,90,44,0.18));
  animation: float 6s var(--easing-settle, ease-in-out) infinite;
}
@keyframes float{
  0%,100%{ transform: translate(-50%, 0); }
  50%   { transform: translate(-50%, -6px); }
}

/* Smoke — Mimir's spirit. Rising wisp, top-center, glowing */
.smoke{
  position:absolute;
  left:50%;
  top: 8%;
  transform: translateX(-50%);
  width: 110px; height: 60%;
  pointer-events:none;
  z-index: 3;
  display:flex; align-items:flex-end; justify-content:center;
}
.smoke-blob{
  width: 88px; height: 88px;
  border-radius: 50% 48% 52% 50% / 55% 50% 50% 45%;
  background:
    radial-gradient(circle at 50% 65%, rgba(255,217,168,0.22), rgba(184,90,44,0.10) 55%, transparent 75%);
  border: 1.5px dashed rgba(214,201,168,0.45);
  display:grid; place-items:center;
  margin-bottom: 6px;
}
.smoke-label{
  font-family: var(--font-mono, ui-monospace, monospace);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(214,201,168,0.7);
  text-align: center;
  line-height: 1.2;
}

/* Wordmark side */
.text{position:relative;z-index:1;flex:1;align-self:center}
.word{font-family:var(--font-display);font-weight:400;font-size:64px;line-height:1;letter-spacing:.01em;color:var(--fg-1);margin:0 0 4px}
.tag{font-family:var(--font-sans);font-size:12px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--fg-3);margin:0 0 14px}
.rule{height:1px;background:linear-gradient(to right,transparent,rgba(214,201,168,.28) 18%,rgba(214,201,168,.28) 82%,transparent);margin:0 0 12px;border:0}
.note{font-family:var(--font-serif);font-style:italic;font-size:13px;color:var(--fg-2);margin:0;text-wrap:pretty;max-width: 46ch;}

@media (prefers-reduced-motion: reduce){
  .well{ animation: none; }
  .smoke .wisp{ animation: none !important; }
}
</style>
</head>
<body>
<div class="f">

  <div class="stage">
    <div class="glow"></div>

    <!-- Smoke placeholder — to revisit. Stamped as a clearly-temporary blob. -->
    <div class="smoke" aria-hidden="true">
      <div class="smoke-blob">
        <span class="smoke-label">smoke<br/>placeholder</span>
      </div>
    </div>

    <img class="well" src="../assets/logos/mimir-mark.png" alt="Mimir — well of wisdom"/>
  </div>

  <div class="text">
    <div class="tag">The Mark · the Well of Wisdom</div>
    <h1 class="word">Mimir</h1>
    <hr class="rule"/>
    <p class="note">The well floats low; the wisp of smoke rising from its mouth is Mimir's spirit — <em>placeholder, to revisit.</em> The mark sits silently beside the wordmark, set in Njord.</p>
  </div>

</div>
</body></html>

<!doctype html>
<!-- @dsCard group="Components" name="Components — Chips & badges" subtitle="Entry pills + status badges" viewport="700x210" -->
<html lang="en"><head><meta charset="utf-8"/><title>Chips & badges</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>html,body{margin:0;padding:0;background:var(--bg-page);color:var(--fg-1)}
.f{padding:18px 22px;background:var(--bg-shell);border:1px solid var(--border);border-radius:10px}
.k{font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--fg-3);margin:0 0 12px}
.row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.row:last-child{margin:0}
.chip{font-family:var(--font-sans);font-size:11.5px;font-weight:600;letter-spacing:.04em;padding:4px 10px;border-radius:999px;border:1px solid;display:inline-flex;align-items:center;gap:5px}
.bd{font-family:var(--font-sans);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;border-radius:3px}
.dot{width:6px;height:6px;border-radius:999px;display:inline-block}
.lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);min-width:90px}
</style></head>
<body><div class="f">
<div class="k">Entry chips · color from --color-entry-* · pill</div>
<div class="row" style="align-items:center"><span class="lbl">entry types</span>
  <span class="chip" style="border-color:#d99366;color:#d99366;background:rgba(217,147,102,.1)"><span class="dot" style="background:#d99366"></span>Character</span>
  <span class="chip" style="border-color:#7da265;color:#7da265;background:rgba(125,162,101,.1)"><span class="dot" style="background:#7da265"></span>Place</span>
  <span class="chip" style="border-color:#c43a4e;color:#c43a4e;background:rgba(196,58,78,.1)"><span class="dot" style="background:#c43a4e"></span>Faction</span>
  <span class="chip" style="border-color:#a07cc8;color:#a07cc8;background:rgba(160,124,200,.1)"><span class="dot" style="background:#a07cc8"></span>Culture</span>
  <span class="chip" style="border-color:#c9a227;color:#c9a227;background:rgba(201,162,39,.1)"><span class="dot" style="background:#c9a227"></span>Rune</span>
</div>
<div class="k">Status badges</div>
<div class="row" style="align-items:center"><span class="lbl">status</span>
  <span class="bd" style="background:rgba(141,132,120,.16);color:#a89878">Stub</span>
  <span class="bd" style="background:rgba(201,162,39,.16);color:#c9a227">Draft</span>
  <span class="bd" style="background:rgba(107,142,78,.16);color:#9bb47d">Complete</span>
  <span class="bd" style="background:rgba(184,90,44,.18);color:#d99366">Linked</span>
  <span class="bd" style="background:rgba(176,58,46,.18);color:#d6735c">Conflict</span>
</div>
</div></body></html>

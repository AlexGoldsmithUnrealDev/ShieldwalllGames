<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1714" />
  <meta http-equiv="refresh" content="10;url=./" />

  <title>404 — Page Not Found — Shieldwall Games</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg" />

  <!-- Theme init — must run before render to prevent flash -->
  <script>
    (function() {
      var saved = localStorage.getItem('swg-theme');
      var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = saved || (systemDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>

  <!-- Styles -->
  <link rel="stylesheet" href="styles/main.css" />
</head>

<body>

  <a href="#main-content" class="skip-link">Skip to main content</a>

  <main id="main-content">
    <section style="min-height:100svh; display:flex; align-items:center; justify-content:center; text-align:center; background:var(--color-ink-900);">
      <div class="container">
        <h1 style="font-family:var(--font-display);font-size:clamp(64px,10vw,120px);color:var(--fg-1);margin:0;">404</h1>
        <p style="font-family:var(--font-serif);font-size:19px;color:var(--fg-2);margin:12px 0 24px;">
          Page not found.
        </p>
        <a href="./" style="color:var(--fg-link); display:inline-block;">
          Return home
        </a>
      </div>
    </section>
  </main>

  <script src="scripts/main.js" defer></script>
</body>
</html>

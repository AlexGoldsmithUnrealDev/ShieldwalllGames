<!doctype html>
<!-- @dsCard group="Colors" name="Color — Ember & Oxblood" subtitle="Primary accent + heaviest emphasis" viewport="700x290" -->
<html lang="en"><head><meta charset="utf-8"/><title>Color — Ember & Oxblood</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>html,body{margin:0;padding:0;background:var(--bg-page);color:var(--fg-1)}
.f{padding:18px;background:var(--bg-shell);border:1px solid var(--border);border-radius:10px}
.k{font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--fg-3);margin:0 0 12px}
.row{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.s{aspect-ratio:1;border-radius:6px;border:1px solid var(--border);position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;padding:6px;font-family:var(--font-mono);font-size:10px}
.s::before{content:"";position:absolute;inset:0;background-image:var(--grain-svg);background-size:220px;opacity:.45;mix-blend-mode:overlay;pointer-events:none}
.lab{position:relative;z-index:1;background:rgba(0,0,0,.45);color:#f7f1e3;padding:2px 5px;border-radius:3px;align-self:flex-start}
.dark .lab{background:rgba(247,241,227,.7);color:#1c140a}
.spacer{height:8px}
</style></head>
<body><div class="f">
<div class="k">Ember · the hearth · primary accent</div>
<div class="row">
  <div class="s dark" style="background:#f3c8a3"><span class="lab">100</span></div>
  <div class="s dark" style="background:#d99366"><span class="lab">300</span></div>
  <div class="s" style="background:#b85a2c"><span class="lab">500 accent</span></div>
  <div class="s" style="background:#9a4520"><span class="lab">600</span></div>
  <div class="s" style="background:#6f2f17"><span class="lab">700</span></div>
  <div class="s" style="background:#4a1f10"><span class="lab">800</span></div>
  <div class="s" style="background:#322b22;box-shadow:0 0 0 1px rgba(184,90,44,.25),0 8px 28px rgba(184,90,44,.18) inset"><span class="lab">glow</span></div>
</div>
<div class="spacer"></div>
<div class="k">Oxblood · heaviest emphasis · Ashborn</div>
<div class="row">
  <div class="s" style="background:#7a1f2b"><span class="lab">500</span></div>
  <div class="s" style="background:#5b1620"><span class="lab">600</span></div>
  <div class="s" style="background:#3d0e15"><span class="lab">700</span></div>
  <div class="s" style="background:#1c1814"><span class="lab">on dark</span></div>
  <div class="s" style="background:#322b22;border:1px solid #7a1f2b"><span class="lab">rule</span></div>
  <div class="s" style="background:#322b22"><span class="lab" style="background:#7a1f2b">chip</span></div>
  <div class="s dark" style="background:#efe6cf;border:1px solid #7a1f2b"><span class="lab" style="background:#7a1f2b;color:#f7f1e3">on light</span></div>
</div></div></body></html>

<!doctype html>
<!-- @dsCard group="Colors" name="Color — Semantic tokens" subtitle="–bg-page, –fg-1, –accent · use these" viewport="700x380" -->
<html lang="en"><head><meta charset="utf-8"/><title>Semantic tokens</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>html,body{margin:0;padding:0;background:var(--bg-page);color:var(--fg-1)}
.f{padding:16px;background:var(--bg-shell);border:1px solid var(--border);border-radius:10px}
.k{font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--fg-3);margin:0 0 12px}
table{width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:11.5px}
td{padding:6px 8px;border-bottom:1px solid rgba(214,201,168,.08);vertical-align:middle}
.sw{width:36px;height:18px;border-radius:3px;border:1px solid var(--border);display:inline-block;vertical-align:middle}
.tk{color:var(--fg-2)}
.note{color:var(--fg-3)}
</style></head>
<body><div class="f">
<div class="k">Semantic tokens · use these, not raw hex</div>
<table>
  <tr><td><span class="sw" style="background:var(--bg-page)"></span></td><td class="tk">--bg-page</td><td class="note">canvas</td></tr>
  <tr><td><span class="sw" style="background:var(--bg-shell)"></span></td><td class="tk">--bg-shell</td><td class="note">sidebar / panels</td></tr>
  <tr><td><span class="sw" style="background:var(--bg-surface)"></span></td><td class="tk">--bg-surface</td><td class="note">cards</td></tr>
  <tr><td><span class="sw" style="background:var(--bg-surface-2)"></span></td><td class="tk">--bg-surface-2</td><td class="note">hover surface</td></tr>
  <tr><td><span class="sw" style="background:var(--fg-1)"></span></td><td class="tk">--fg-1</td><td class="note">primary text</td></tr>
  <tr><td><span class="sw" style="background:var(--fg-2)"></span></td><td class="tk">--fg-2</td><td class="note">secondary</td></tr>
  <tr><td><span class="sw" style="background:var(--fg-3)"></span></td><td class="tk">--fg-3</td><td class="note">muted / captions</td></tr>
  <tr><td><span class="sw" style="background:var(--accent)"></span></td><td class="tk">--accent</td><td class="note">ember 500</td></tr>
  <tr><td><span class="sw" style="background:var(--accent-frost)"></span></td><td class="tk">--accent-frost</td><td class="note">steel / info</td></tr>
  <tr><td><span class="sw" style="background:var(--accent-gilt)"></span></td><td class="tk">--accent-gilt</td><td class="note">gilt — sparingly</td></tr>
  <tr><td><span class="sw" style="background:var(--border)"></span></td><td class="tk">--border</td><td class="note">hairline rule</td></tr>
</table></div></body></html>

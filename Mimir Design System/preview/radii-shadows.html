<!doctype html>
<!-- @dsCard group="Spacing" name="Spacing — Radii & shadows" subtitle="6px default · lantern shadows · ember glow" viewport="700x250" -->
<html lang="en"><head><meta charset="utf-8"/><title>Radii & shadows</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>html,body{margin:0;padding:0;background:var(--bg-page);color:var(--fg-1)}
.f{padding:20px;background:var(--bg-shell);border:1px solid var(--border);border-radius:10px}
.k{font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--fg-3);margin:0 0 14px}
.row{display:flex;gap:18px;align-items:flex-end;flex-wrap:wrap;margin-bottom:18px}
.row:last-child{margin:0}
.b{background:var(--bg-surface);border:1px solid var(--border);width:84px;height:64px;display:flex;align-items:flex-end;padding:6px;font-family:var(--font-mono);font-size:10px;color:var(--fg-3)}
.s{width:100px;height:64px;background:var(--bg-surface);border:1px solid var(--border);border-radius:6px;display:flex;align-items:flex-end;padding:6px;font-family:var(--font-mono);font-size:10px;color:var(--fg-3)}
</style></head>
<body><div class="f">
<div class="k">Radii</div>
<div class="row">
  <div class="b" style="border-radius:2px">2 · xs</div>
  <div class="b" style="border-radius:4px">4 · sm</div>
  <div class="b" style="border-radius:6px">6 · md</div>
  <div class="b" style="border-radius:10px">10 · lg</div>
  <div class="b" style="border-radius:16px">16 · xl</div>
  <div class="b" style="border-radius:999px;width:120px">pill</div>
</div>
<div class="k">Shadows · lantern, never neutral</div>
<div class="row">
  <div class="s" style="box-shadow:0 1px 0 rgba(0,0,0,.3),0 1px 2px rgba(0,0,0,.2)">sm</div>
  <div class="s" style="box-shadow:0 1px 0 rgba(0,0,0,.3),0 4px 12px rgba(0,0,0,.35)">md</div>
  <div class="s" style="box-shadow:0 2px 0 rgba(0,0,0,.4),0 16px 32px rgba(0,0,0,.45)">lg</div>
  <div class="s" style="box-shadow:0 0 0 1px rgba(184,90,44,.25),0 8px 28px rgba(184,90,44,.18)">glow-ember</div>
</div></div></body></html>

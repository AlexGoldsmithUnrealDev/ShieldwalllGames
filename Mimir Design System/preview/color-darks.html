<!doctype html>
<!-- @dsCard group="Colors" name="Color — Warm darks" subtitle="Ink-900 → 100 · canvas, shells, fg" viewport="700x210" -->
<html lang="en"><head><meta charset="utf-8"/><title>Color — Warm darks</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>html,body{margin:0;padding:0;background:var(--bg-page);color:var(--fg-1)}
.f{padding:18px;background:var(--bg-shell);border:1px solid var(--border);border-radius:10px}
.k{font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--fg-3);margin:0 0 12px}
.row{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.s{aspect-ratio:1;border-radius:6px;border:1px solid var(--border);position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;padding:6px;font-family:var(--font-mono);font-size:10px;color:#d6c9a8}
.s::before{content:"";position:absolute;inset:0;background-image:var(--grain-svg);background-size:220px;opacity:.5;mix-blend-mode:overlay;pointer-events:none}
.lab{position:relative;z-index:1;background:rgba(0,0,0,.45);padding:2px 5px;border-radius:3px;align-self:flex-start}
</style></head>
<body><div class="f">
<div class="k">Warm darks · ink-900 → ink-100</div>
<div class="row">
  <div class="s" style="background:#14100d"><span class="lab">900</span></div>
  <div class="s" style="background:#1c1814"><span class="lab">800 page</span></div>
  <div class="s" style="background:#25201a"><span class="lab">700 shell</span></div>
  <div class="s" style="background:#322b22"><span class="lab">600 surface</span></div>
  <div class="s" style="background:#423a2e"><span class="lab">500</span></div>
  <div class="s" style="background:#5a4f3f"><span class="lab">400</span></div>
  <div class="s" style="background:#7a6c58"><span class="lab" style="color:#1c1814;background:rgba(255,240,210,.7)">300</span></div>
  <div class="s" style="background:#a89878"><span class="lab" style="color:#1c1814;background:rgba(255,240,210,.7)">200</span></div>
  <div class="s" style="background:#d6c9a8"><span class="lab" style="color:#1c1814;background:rgba(255,240,210,.7)">100 fg</span></div>
  <div class="s" style="background:#1c1814;border:1px solid #b85a2c"><span class="lab" style="color:#b85a2c">800 + ember rule</span></div>
  <div class="s" style="background:#322b22;box-shadow:inset 0 0 0 1px rgba(255,240,210,.05),inset 0 -1px 0 rgba(0,0,0,.3)"><span class="lab">600 emboss</span></div>
  <div class="s" style="background:#322b22"><span class="lab" style="background:rgba(184,90,44,.4)">accent-soft</span></div>
</div></div></body></html>

<!doctype html>
<!-- @dsCard group="Brand" name="Brand — Iconography" subtitle="16 painted entry plates + Lucide for UI" viewport="700x230" -->
<html lang="en"><head><meta charset="utf-8"/><title>Brand · iconography</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>html,body{margin:0;padding:0;background:var(--bg-page);color:var(--fg-1)}
.f{padding:14px 16px;background:var(--bg-shell);border:1px solid var(--border);border-radius:10px;position:relative;overflow:hidden}
.f::before{content:"";position:absolute;inset:0;background-image:var(--grain-svg);background-size:220px;opacity:.5;mix-blend-mode:overlay;pointer-events:none}
.in{position:relative;z-index:1}
.k{font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--fg-3);margin:0 0 10px}
.grid{display:grid;grid-template-columns:repeat(8,1fr);gap:8px}
.cell{aspect-ratio:1;background:rgba(214,201,168,.04);border:1px solid var(--border);border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px;gap:3px}
.cell img{width:38px;height:38px;object-fit:contain;filter:invert() opacity(.78)}
.lab{font-family:var(--font-sans);font-size:9px;color:var(--fg-3);text-align:center;line-height:1.1}
</style></head>
<body><div class="f"><div class="in">
<div class="k">Entry-type plates · 16 painted icons · 48px+ display use</div>
<div class="grid">
  <div class="cell"><img src="../assets/icons/character.png"/><span class="lab">Character</span></div>
  <div class="cell"><img src="../assets/icons/species.png"/><span class="lab">Species</span></div>
  <div class="cell"><img src="../assets/icons/culture.png"/><span class="lab">Culture</span></div>
  <div class="cell"><img src="../assets/icons/place.png"/><span class="lab">Place</span></div>
  <div class="cell"><img src="../assets/icons/faction.png"/><span class="lab">Faction</span></div>
  <div class="cell"><img src="../assets/icons/event.png"/><span class="lab">Event</span></div>
  <div class="cell"><img src="../assets/icons/quest.png"/><span class="lab">Quest</span></div>
  <div class="cell"><img src="../assets/icons/storyarc.png"/><span class="lab">Story arc</span></div>
  <div class="cell"><img src="../assets/icons/dialogue.png"/><span class="lab">Dialogue</span></div>
  <div class="cell"><img src="../assets/icons/spell.png"/><span class="lab">Spell</span></div>
  <div class="cell"><img src="../assets/icons/rune.png"/><span class="lab">Rune</span></div>
  <div class="cell"><img src="../assets/icons/runemark.png"/><span class="lab">Runemark</span></div>
  <div class="cell"><img src="../assets/icons/mantle.png"/><span class="lab">Mantle</span></div>
  <div class="cell"><img src="../assets/icons/artefact.png"/><span class="lab">Artefact</span></div>
  <div class="cell"><img src="../assets/icons/language.png"/><span class="lab">Language</span></div>
  <div class="cell" style="background:#14100d"><span class="lab" style="color:#a89878;font-family:var(--font-mono);font-size:14px">+ Lucide</span><span class="lab">UI utility</span></div>
</div></div></div></body></html>

<!doctype html>
<!-- @dsCard group="Colors" name="Color — Frost & Gilt" subtitle="Cool support + sparing gilt" viewport="700x290" -->
<html lang="en"><head><meta charset="utf-8"/><title>Color — Frost & Gilt</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>html,body{margin:0;padding:0;background:var(--bg-page);color:var(--fg-1)}
.f{padding:18px;background:var(--bg-shell);border:1px solid var(--border);border-radius:10px}
.k{font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--fg-3);margin:0 0 10px}
.row{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:8px}
.s{aspect-ratio:1;border-radius:6px;border:1px solid var(--border);position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;padding:6px;font-family:var(--font-mono);font-size:10px}
.s::before{content:"";position:absolute;inset:0;background-image:var(--grain-svg);background-size:220px;opacity:.45;mix-blend-mode:overlay;pointer-events:none}
.lab{position:relative;z-index:1;background:rgba(0,0,0,.45);color:#f7f1e3;padding:2px 5px;border-radius:3px;align-self:flex-start}
.dark .lab{background:rgba(247,241,227,.7);color:#1c140a}
</style></head>
<body><div class="f">
<div class="k">Frost · steel / mist · Shield Wall + info</div>
<div class="row">
  <div class="s dark" style="background:#d6dde2"><span class="lab">100</span></div>
  <div class="s" style="background:#8aa0ab"><span class="lab">300</span></div>
  <div class="s" style="background:#4f6573"><span class="lab">500</span></div>
  <div class="s" style="background:#2a3a45"><span class="lab">700</span></div>
  <div class="s" style="background:#14202a"><span class="lab">900</span></div>
  <div class="s" style="background:#1c1814;border:1px solid #4f6573"><span class="lab">rule</span></div>
  <div class="s" style="background:#322b22"><span class="lab" style="background:#4f6573">chip</span></div>
</div>
<div class="k">Gilt · sparingly · runes, premium</div>
<div class="row">
  <div class="s dark" style="background:#e8c875"><span class="lab">300</span></div>
  <div class="s" style="background:#c9a227"><span class="lab">500</span></div>
  <div class="s" style="background:#8a6f1a"><span class="lab">700</span></div>
  <div class="s" style="background:#1c1814;color:#c9a227;font-family:var(--font-runic);font-size:22px;display:flex;align-items:center;justify-content:center"><span style="position:relative;z-index:1">ᚠᚱ</span></div>
  <div class="s" style="background:#322b22;border:1px solid #c9a227"><span class="lab" style="color:#c9a227">rule</span></div>
  <div class="s" style="background:#322b22"><span class="lab" style="background:#c9a227;color:#1c1814">chip</span></div>
  <div class="s" style="background:#322b22"><span class="lab" style="background:rgba(201,162,39,.18);color:#e8c875">soft</span></div>
</div></div></body></html>

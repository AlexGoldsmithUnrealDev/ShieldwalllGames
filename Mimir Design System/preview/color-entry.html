<!doctype html>
<!-- @dsCard group="Colors" name="Color — Entry types" subtitle="13 entry-type accents re-tuned for warm dark" viewport="700x230" -->
<html lang="en"><head><meta charset="utf-8"/><title>Color — Entry types</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>html,body{margin:0;padding:0;background:var(--bg-page);color:var(--fg-1)}
.f{padding:16px;background:var(--bg-shell);border:1px solid var(--border);border-radius:10px}
.k{font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--fg-3);margin:0 0 12px}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cell{aspect-ratio:1.1;border-radius:6px;display:flex;flex-direction:column;justify-content:flex-end;padding:6px;border:1px solid;position:relative;overflow:hidden;font-family:var(--font-mono);font-size:9px}
.cell::before{content:"";position:absolute;inset:0;background-image:var(--grain-svg);background-size:220px;opacity:.4;mix-blend-mode:overlay;pointer-events:none}
.tag{font-family:var(--font-sans);font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;position:relative;z-index:1}
</style></head>
<body><div class="f">
<div class="k">Entry-type accents · re-tuned for warm dark · 13 types</div>
<div class="grid">
  <div class="cell" style="background:rgba(217,147,102,.16);border-color:#d99366;color:#d99366"><span class="tag">Character</span></div>
  <div class="cell" style="background:rgba(111,163,157,.16);border-color:#6fa39d;color:#6fa39d"><span class="tag">Species</span></div>
  <div class="cell" style="background:rgba(160,124,200,.16);border-color:#a07cc8;color:#a07cc8"><span class="tag">Culture</span></div>
  <div class="cell" style="background:rgba(125,162,101,.16);border-color:#7da265;color:#7da265"><span class="tag">Place</span></div>
  <div class="cell" style="background:rgba(201,162,39,.16);border-color:#c9a227;color:#c9a227"><span class="tag">Rune</span></div>
  <div class="cell" style="background:rgba(184,112,47,.16);border-color:#b8702f;color:#b8702f"><span class="tag">Runemark</span></div>
  <div class="cell" style="background:rgba(176,58,78,.16);border-color:#b03a4e;color:#b03a4e"><span class="tag">Mantle</span></div>
  <div class="cell" style="background:rgba(107,137,194,.16);border-color:#6b89c2;color:#6b89c2"><span class="tag">Spell</span></div>
  <div class="cell" style="background:rgba(196,58,78,.16);border-color:#c43a4e;color:#c43a4e"><span class="tag">Faction</span></div>
  <div class="cell" style="background:rgba(168,129,77,.16);border-color:#a8814d;color:#a8814d"><span class="tag">Artifact</span></div>
  <div class="cell" style="background:rgba(141,132,120,.18);border-color:#8d8478;color:#a89878"><span class="tag">Event</span></div>
  <div class="cell" style="background:rgba(138,160,171,.16);border-color:#8aa0ab;color:#8aa0ab"><span class="tag">Language</span></div>
  <div class="cell" style="background:rgba(138,120,194,.16);border-color:#8a78c2;color:#8a78c2"><span class="tag">Story arc</span></div>
  <div class="cell" style="background:rgba(217,147,102,.16);border-color:#d99366;color:#d99366"><span class="tag">Quest</span></div>
</div></div></body></html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ashborn: Kickstarter</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
</head>
<body>
  <header>
    <div class="header-inner">
        <div class="nav-left">
            <a href="index.html" class="brand-link">
             <!-- Logo image -->
             <img src="images/bgimage.jpg" alt="Ashborn Logo" class="logo">
             <h1><span class="shimmer-text" data-text="Ashborn: Fire and Blood">Ashborn: Fire and Blood</span></h1>
            </a>
        </div>

        <!-- Hamburger Icon -->
        <button class="hamburger" aria-label="Toggle navigation">
          ☰
        </button>

        <!-- Navigation Menu -->
        <nav class="nav-right">
          <ul>
            <li><a href="#">Game</a></li>
            <li><a href="#">Media</a></li>
            <li><a href="#">Devlog</a></li>
            <li><a href="#">About</a></li>
          </ul>
        </nav>
    </div>
  </header>

<main class="kickstarter-page">
  <section class="kickstarter-content">
    <h2>Support Ashborn on Kickstarter</h2>
    
    <!-- Countdown -->
    <div id="countdown" class="countdown-timer">
      <p>Launching In:</p>
      <div class="time">
        <span id="days">--</span>d :
        <span id="hours">--</span>h :
        <span id="minutes">--</span>m :
        <span id="seconds">--</span>s
      </div>
    </div>

    <!-- Progress Bar -->
    <div class="funding-section">
      <p><strong>Funding Progress:</strong></p>
      <div class="progress-bar">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
      <p id="funding-amount">$0 of $100,000 goal</p>
    </div>

    <!-- Button to Kickstarter -->
    <a class="kickstarter-button" href="https://www.kickstarter.com/YOUR_CAMPAIGN_LINK" target="_blank">
      Visit Our Kickstarter Campaign
    </a>
  </section>
</main>


  <footer>
    <p>© 2025 Shieldwall Games. All rights reserved.</p>
  </footer>

  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  
  <script>
    AOS.init();
  </script>

  <script src="script.js"></script>
  
  <script>
    // Countdown
    const launchDate = new Date("2025-12-01T00:00:00Z").getTime();

    const countdownTimer = setInterval(() => {
      const now = new Date().getTime();
      const distance = launchDate - now;

      if (distance <= 0) {
        clearInterval(countdownTimer);
        document.getElementById("countdown").innerHTML = "We are live on Kickstarter!";
      } else {
        document.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24));
        document.getElementById("hours").innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        document.getElementById("minutes").innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        document.getElementById("seconds").innerText = Math.floor((distance % (1000 * 60)) / 1000);
      }
    }, 1000);

    // Simulated funding data
    const goal = 100000;
    const current = 0; // Replace with real value if needed
    const percentage = Math.min(100, (current / goal) * 100);

    document.getElementById("progress-fill").style.width = percentage + "%";
    document.getElementById("funding-amount").innerText = `$${current.toLocaleString()} of $${goal.toLocaleString()} goal`;
  </script>
  
</body>
</html>

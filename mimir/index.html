<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d1117" />

  <title>Mimir — Worldbuilding for Indie Developers, Writers & GMs</title>
  <meta name="description" content="Mimir turns your world lore into structured markdown data — ready for any AI tool, game engine, or creative workflow. Built by Shieldwall Games." />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Mimir — Structured Worldbuilding" />
  <meta property="og:description" content="Your world, ready for any AI tool or game engine. Mimir is the worldbuilding platform built for indie developers, writers, and GMs." />
  <meta property="og:url" content="https://shieldwallgames.co.uk/mimir/" /> <!-- TODO: confirm live URL -->
  <meta property="og:image" content="" /> <!-- TODO: add OG image 1200x630px before launch -->

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Mimir — Structured Worldbuilding" />
  <meta name="twitter:description" content="Your world, ready for any AI tool or game engine." />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="../assets/icons/favicon.svg" />

  <!-- Styles: shared tokens first, then Mimir components -->
  <link rel="stylesheet" href="../styles/main.css" />
  <link rel="stylesheet" href="styles/mimir.css" />

  <!-- Theme init — runs before render to prevent flash. Mimir defaults to dark. -->
  <script>
    (function() {
      var saved = localStorage.getItem('swg-theme');
      var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = saved || (systemDark ? 'dark' : 'dark'); /* Mimir default: dark */
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>

<body class="theme-mimir">

  <!-- Top bar: orientation strip linking back to studio site -->
  <div class="top-bar" role="navigation" aria-label="Return to Shieldwall Games">
    <div class="top-bar__inner">
      <a href="/" class="top-bar__back">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12 19 5 12 12 5"/>
        </svg>
        Shieldwall Games
      </a>
      <!-- Theme toggle mounted here on the right -->
      <div class="theme-toggle-mount" aria-label="Toggle colour theme"></div>
    </div>
  </div>

  <!-- Main Mimir navigation -->
  <header class="mimir-nav" role="banner">
    <div class="mimir-nav__inner">

      <a href="/mimir/" class="mimir-nav__wordmark" aria-label="Mimir home">
        Mimir
      </a>

      <nav aria-label="Mimir navigation">
        <ul class="mimir-nav__links" role="list">
          <li><a href="#features">Features</a></li>
          <li><a href="#pricing">Pricing</a></li>
          <li><a href="#faq">FAQ</a></li>
        </ul>
      </nav>

      <a href="#beta-signup" class="mimir-nav__cta">
        Join the beta
      </a>

      <button
        class="mimir-nav__hamburger"
        aria-label="Open navigation menu"
        aria-expanded="false"
        aria-controls="mimir-mobile-drawer"
        type="button"
      >
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
      </button>

    </div>

    <!-- Mobile drawer -->
    <div class="mimir-nav__drawer" id="mimir-mobile-drawer" role="navigation" aria-label="Mimir mobile navigation">
      <a href="#features">Features</a>
      <a href="#pricing">Pricing</a>
      <a href="#faq">FAQ</a>
      <a href="#beta-signup">Join the beta</a>
    </div>
  </header>

  <main id="main-content">

  <!-- All sections added in subsequent prompts -->

  <!-- Scripts: shared first, then Mimir-specific -->
  <script src="../scripts/main.js" defer></script>
  <script src="scripts/mimir.js" defer></script>

</body>
</html>

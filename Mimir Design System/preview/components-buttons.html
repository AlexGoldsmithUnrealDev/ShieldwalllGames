<!doctype html>
<!-- @dsCard group="Components" name="Components — Buttons" subtitle="Primary / secondary / ghost / danger / icon" viewport="700x270" -->
<html lang="en"><head><meta charset="utf-8"/><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>html,body{margin:0;padding:0;background:var(--bg-page);color:var(--fg-1)}
.f{padding:18px 22px;background:var(--bg-shell);border:1px solid var(--border);border-radius:10px;position:relative;overflow:hidden}
.f::before{content:"";position:absolute;inset:0;background-image:var(--grain-svg);background-size:220px;opacity:.5;mix-blend-mode:overlay;pointer-events:none}
.in{position:relative;z-index:1}
.k{font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--fg-3);margin:0 0 12px}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.row:last-child{margin:0}
button{font-family:var(--font-sans);font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:8px;letter-spacing:.01em;transition:all 240ms var(--easing-settle)}
.primary{background:var(--accent);color:var(--fg-on-accent);border:1px solid rgba(255,240,210,.06);padding:9px 16px;border-radius:6px;box-shadow:inset 0 1px 0 rgba(255,240,210,.12),0 1px 0 rgba(0,0,0,.3),0 4px 12px rgba(184,90,44,.2)}
.secondary{background:var(--bg-surface);color:var(--fg-1);border:1px solid var(--border);padding:9px 16px;border-radius:6px}
.ghost{background:transparent;color:var(--fg-2);border:1px solid transparent;padding:9px 12px;border-radius:6px}
.ghost:hover{color:var(--fg-1);background:rgba(214,201,168,.05)}
.danger{background:var(--color-oxblood-500);color:#f7f1e3;border:1px solid rgba(255,240,210,.06);padding:9px 16px;border-radius:6px}
.icon{padding:8px;border-radius:6px;background:var(--bg-surface);border:1px solid var(--border);color:var(--fg-2)}
.lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);min-width:78px}
</style></head>
<body><div class="f"><div class="in">
<div class="k">Buttons · sentence case · 6px radius · ember CTA</div>
<div class="row"><span class="lbl">primary</span><button class="primary">Save entry</button><button class="primary">New entry</button></div>
<div class="row"><span class="lbl">secondary</span><button class="secondary">Cancel</button><button class="secondary">Open folder</button></div>
<div class="row"><span class="lbl">ghost</span><button class="ghost">Show more</button><button class="ghost">Edit</button></div>
<div class="row"><span class="lbl">danger</span><button class="danger">Delete entry</button></div>
<div class="row"><span class="lbl">icon</span><button class="icon">⌘K</button><button class="icon">＋</button><button class="icon">⋯</button></div>
</div></div></body></html>

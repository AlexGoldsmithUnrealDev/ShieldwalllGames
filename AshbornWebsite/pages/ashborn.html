<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Required meta tags for responsive layout -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- Page Title -->
  <title>Ashborn: Series</title>

  <!-- Cinzel font for thematic styling -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet" />

  <!-- ✅ Fixed: Link to main stylesheet (from /pages/ to /assets/css/) -->
  <link rel="stylesheet" href="../assets/css/style.css" />

  <!-- AOS (Animate on Scroll) library -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet" />
</head>

<!-- HEADER injected via header.js -->

<body>
  <div class="games-page">

    <!-- Hero Section -->

    <!-- Games Grid -->
    <section class="games-grid">
      <a href="fire-and-blood.html" class="game-card" style="background-image: url('../assets/images/games/origin.jpg');">

          <h3>Ashborn: Fire & Blood</h3>
        </div>
      </a>

      <a href="/games/ashborn-reckoning" class="game-card" style="background-image: url('../assets/images/games/reckoning.jpg');">

          <h3>Ashborn: Reckoning</h3>
        </div>
      </a>

      <a href="/games/ashborn-eternal" class="game-card" style="background-image: url('../assets/images/games/eternal.jpg');">
        <div class="overlay">
          <h3>Ashborn: Eternal</h3>
        </div>
      </a>

      <!-- Add more cards as needed -->
    </section>

  </div>

<!-- AOS Library -->
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
  AOS.init(); // Initialize scroll animations
</script>

<!-- JS Modules -->
<script src="../assets/js/header.js"></script>
<script src="../assets/js/ashborn.js"></script>

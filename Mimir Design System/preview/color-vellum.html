<!doctype html>
<!-- @dsCard group="Colors" name="Color — Vellum" subtitle="Parchment neutrals · vellum-50 → 500" viewport="700x190" -->
<html lang="en"><head><meta charset="utf-8"/><title>Color — Vellum</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>html,body{margin:0;padding:0;background:var(--bg-page);color:var(--fg-1)}
.f{padding:18px;background:var(--bg-shell);border:1px solid var(--border);border-radius:10px}
.k{font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--fg-3);margin:0 0 12px}
.row{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.s{aspect-ratio:1;border-radius:6px;border:1px solid var(--border);position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;padding:6px;font-family:var(--font-mono);font-size:10px}
.s::before{content:"";position:absolute;inset:0;background-image:var(--grain-svg);background-size:220px;opacity:.45;mix-blend-mode:overlay;pointer-events:none}
.lab{position:relative;z-index:1;background:rgba(28,20,10,.55);color:#f7f1e3;padding:2px 5px;border-radius:3px;align-self:flex-start}
.dark .lab{background:rgba(247,241,227,.7);color:#1c140a}
</style></head>
<body><div class="f">
<div class="k">Parchment / vellum · vellum-50 → vellum-500</div>
<div class="row">
  <div class="s dark" style="background:#f7f1e3"><span class="lab">50</span></div>
  <div class="s dark" style="background:#efe6cf"><span class="lab">100 page-light</span></div>
  <div class="s dark" style="background:#e3d6b6"><span class="lab">200</span></div>
  <div class="s dark" style="background:#c9b88f"><span class="lab">300</span></div>
  <div class="s" style="background:#a8966a"><span class="lab">400</span></div>
  <div class="s" style="background:#786843"><span class="lab">500</span></div>
</div></div></body></html>

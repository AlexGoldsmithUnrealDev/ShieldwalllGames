<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Page not found — Shieldwall Games">
    <meta name="theme-color" content="#1a1714">
    <meta http-equiv="refresh" content="10;url=index.html">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
    <!-- TODO: generate a .png fallback from the SVG before launch -->
    <link rel="icon" type="image/png" href="assets/icons/favicon.png">

    <title>Page Not Found — Shieldwall Games</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>

    <main>
        <section class="hero section-dark" id="error-page">
            <div class="container">
                <p class="hero__eyebrow">Lost in the Dark</p>
                <h1 class="hero__title">404</h1>
                <p class="hero__subtitle">This page has wandered from the path.</p>
                <p class="hero__subtitle">
                    The scroll you're looking for doesn't exist — or may have been moved.
                </p>
                <div class="hero__actions">
                    <a href="index.html" class="btn btn-primary">Return to Shieldwall Games</a>
                    <a href="ashborn.html" class="btn btn-secondary">Explore Ashborn</a>
                </div>
                <p id="countdown-text" class="games-note">
                    Redirecting to the homepage in <span id="countdown">10</span> seconds.
                </p>
            </div>
        </section>
    </main>

    <script src="scripts/main.js" defer></script>
    <script>
        /* Countdown timer — updates the redirect counter in real time */
        document.addEventListener('DOMContentLoaded', function () {
            var countdownEl = document.getElementById('countdown');
            if (!countdownEl) return;

            var seconds = 10;

            var interval = setInterval(function () {
                seconds--;
                countdownEl.textContent = seconds;

                if (seconds <= 0) {
                    clearInterval(interval);
                }
            }, 1000);
        });
    </script>
</body>
</html>

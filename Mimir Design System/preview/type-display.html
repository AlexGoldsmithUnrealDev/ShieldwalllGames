<!doctype html>
<!-- @dsCard group="Type" name="Type — Njord display" subtitle="Njord Regular + Alternate · display only · ≥28px" viewport="700x230" -->
<html lang="en"><head><meta charset="utf-8"/><title>Type — Display</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>html,body{margin:0;padding:0;background:var(--bg-page);color:var(--fg-1)}
.f{padding:18px 22px;background:var(--bg-shell);border:1px solid var(--border);border-radius:10px;position:relative;overflow:hidden;min-height:200px}
.f::before{content:"";position:absolute;inset:0;background-image:var(--grain-svg);background-size:220px 220px;opacity:.5;mix-blend-mode:overlay;pointer-events:none}
.in{position:relative;z-index:1}
.kicker{font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--fg-3);margin-bottom:10px}
.spec{font-family:var(--font-display);font-weight:400;font-size:64px;line-height:1.05;letter-spacing:-.01em;margin:0 0 8px}
.alt{font-family:var(--font-display);font-weight:700;font-size:30px;line-height:1.1;color:var(--accent);margin:0 0 14px}
.meta{font-family:var(--font-sans);font-size:12px;color:var(--fg-3)}
.row{display:flex;justify-content:space-between;align-items:flex-end;gap:24px}
</style></head>
<body><div class="f"><div class="in">
<div class="kicker">Display — Njord</div>
<div class="spec">Halls of Saga</div>
<div class="alt">Alternate weight</div>
<div class="row"><div class="meta">Njord Regular · Njord Alternate · woff2 · self-hosted in /fonts/</div><div class="meta">Display only · ≥ 28px</div></div>
</div></div></body></html>

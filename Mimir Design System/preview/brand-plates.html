<!doctype html>
<!-- @dsCard group="Brand" name="Brand — Themed plates" subtitle="Zone headers in app · full-bleed on marketing" viewport="700x280" -->
<html lang="en"><head><meta charset="utf-8"/><title>Brand · plates</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>html,body{margin:0;padding:0;background:var(--bg-page);color:var(--fg-1)}
.f{padding:14px;background:var(--bg-shell);border:1px solid var(--border);border-radius:10px}
.k{font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--fg-3);margin:0 0 10px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.p{aspect-ratio:1.4;border-radius:6px;border:1px solid var(--border);overflow:hidden;position:relative;background-size:cover;background-position:center}
.p::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 0%,transparent 55%,rgba(20,16,13,.85) 100%)}
.p::before{content:"";position:absolute;inset:0;background-image:var(--grain-svg);background-size:220px;mix-blend-mode:overlay;opacity:.45;z-index:1}
.lab{position:absolute;left:8px;bottom:6px;font-family:var(--font-serif);font-size:13px;color:#f7f1e3;letter-spacing:.01em;z-index:2;text-shadow:0 1px 8px rgba(0,0,0,.6)}
</style></head>
<body><div class="f">
<div class="k">Themed plates · zone headers in app · full-bleed on marketing</div>
<div class="grid">
  <div class="p" style="background-image:url('../assets/plates/avalon.png')"><span class="lab">Avalon</span></div>
  <div class="p" style="background-image:url('../assets/plates/kernow.png')"><span class="lab">Kernow</span></div>
  <div class="p" style="background-image:url('../assets/plates/firefalls.png')"><span class="lab">Firefalls</span></div>
  <div class="p" style="background-image:url('../assets/plates/forest.png')"><span class="lab">Forest</span></div>
  <div class="p" style="background-image:url('../assets/plates/coastal.png')"><span class="lab">Coastal</span></div>
  <div class="p" style="background-image:url('../assets/plates/tundra.png')"><span class="lab">Tundra</span></div>
  <div class="p" style="background-image:url('../assets/plates/hellas.png')"><span class="lab">Hellas</span></div>
  <div class="p" style="background-image:url('../assets/plates/fairy-ring.png')"><span class="lab">Fairy ring</span></div>
</div></div></body></html>

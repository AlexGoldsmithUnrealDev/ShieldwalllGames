<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Required meta tags for responsive layout -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- Page Title -->
  <title>Ashborn: Fire and Blood</title>

  <!-- Cinzel font for thematic styling -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet" />

  <!-- ✅ Fixed: Link to main stylesheet (from /pages/ to /assets/css/) -->
  <link rel="stylesheet" href="../assets/css/style.css" />

  <!-- AOS (Animate on Scroll) library -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet" />
</head>

<body>
    <main class="fire-blood-page">
        
        <!--HERO SECTION-->
        <section class="hero hero-wishlist" data-aos="fade-in">
            <div class="video-background">
                <iframe
                src="https://www.youtube.com/embed/oVU9LW4a2pQ?autoplay=1&mute=1&loop=1&controls=0&showinfo=0&playlist=oVU9LW4a2pQ&modestbranding=1"
                frameborder="0"
                allow="autoplay; fullscreen"
                allowfullscreen>
                </iframe>
            </div>

            <!-- Fade at bottom to separate video from content -->
            <div class="hero-fade"></div>

            <div class="hero-content">
                <h2>ASHBORN: FIRE & BLOOD</h2>
                <p>Rise from ash. Drown the world in flame.</p>
            </div>
        </section>

        <!-- ========== WISHLIST PANELS SECTION ========== -->
        <div class="full-width-wishlist">

            <!--Steam Panel-->
            <div class="wishlist-panel-wrapper steam">
                <div class="wishlist-panel steam">
                <a href="#" class="wishlist-button">Wishlist on Steam</a>
                </div>
            </div>

            <!--Epic Panel-->
            <div class="wishlist-panel-wrapper epic">
                <div class="wishlist-panel epic">
                <a href="#" class="wishlist-button">Wishlist on Epic Games</a>
                </div>
            </div>

        </div>




        <!--IMAGE CAROUSEL-->
        <section class="carousel-container">
        <!-- Left arrow -->
        <button class="carousel-btn left" id="prev">&#10094;</button>

        <!-- Images -->
        <div class="carousel">            
            <div class="carousel-slide active">
                <img src="../assets/images/fireandblood1.jpg" alt="Screenshot 1">
                <div class="caption">Early Concept Art</div>
            </div>
            <div class="carousel-slide">
                <img src="../assets/images/fireandblood2.jpg" alt="Screenshot 2">
                <div class="caption">Early Concept Art</div>
            </div>
            <div class="carousel-slide">
                <img src="../assets/images/fireandblood3.jpg" alt="Screenshot 3">
                <div class="caption">Early Concept Art</div>
            </div>
            <div class="carousel-slide">
                <img src="../assets/images/fireandblood4.jpg" alt="Screenshot 4">
                <div class="caption">Early Concept Art</div>
            </div>
            <div class="carousel-slide">
                <img src="../assets/images/fireandblood5.jpg" alt="Screenshot 5">
                <div class="caption">Early Concept Art</div>
            </div>
        </div>

        <!-- Right arrow -->
        <button class="carousel-btn right" id="next">&#10095;</button>
        </section>

    </main>

<!-- AOS Library -->
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
  AOS.init(); // Initialize scroll animations
</script>

<!-- JS Modules -->
<script src="../assets/js/header.js"></script>
<script src="../assets/js/fire-and-blood.js"></script>
</body>
</html>

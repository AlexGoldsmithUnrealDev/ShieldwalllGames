<!doctype html>
<!-- @dsCard group="Components" name="Components — Sidebar" subtitle="Framed like a binding · ember bound edge" viewport="700x380" -->
<html lang="en"><head><meta charset="utf-8"/><title>Sidebar · the binding</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>html,body{margin:0;padding:0;background:var(--bg-page);color:var(--fg-1)}
.f{padding:14px;background:var(--bg-shell);border:1px solid var(--border);border-radius:10px;display:flex;gap:14px}
.k{font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--fg-3);margin:0 0 8px}
.side{width:230px;background:var(--color-ink-700);border:1px solid var(--border);border-right:3px solid var(--accent-strong);border-radius:6px 2px 2px 6px;padding:12px 0;font-family:var(--font-sans);font-size:13px;position:relative;overflow:hidden;box-shadow:inset -1px 0 0 rgba(0,0,0,.4)}
.side::before{content:"";position:absolute;inset:0;background-image:var(--grain-svg);background-size:220px;opacity:.5;mix-blend-mode:overlay;pointer-events:none}
.brand{position:relative;z-index:1;display:flex;align-items:center;gap:8px;padding:0 14px 10px;border-bottom:1px solid var(--border)}
.brand img{width:24px;height:24px}
.brand .w{font-family:var(--font-display);font-size:22px;letter-spacing:.01em}
.eye{position:relative;z-index:1;font-size:10.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--fg-3);padding:14px 14px 6px}
.row{position:relative;z-index:1;display:flex;align-items:center;gap:9px;padding:6px 14px;color:var(--fg-2);cursor:pointer}
.row.active{background:rgba(184,90,44,.14);color:var(--fg-1);box-shadow:inset 3px 0 0 var(--accent)}
.row .dot{width:6px;height:6px;border-radius:999px}
.notes{flex:1;display:flex;align-items:center;justify-content:center;font-family:var(--font-serif);font-style:italic;color:var(--fg-3);text-align:center;padding:30px;font-size:13.5px;line-height:1.55}
</style></head>
<body><div class="f">
<div>
<div class="k">Sidebar · framed like a binding</div>
<div class="side">
  <div class="brand"><img src="../assets/logos/mimir-mark.png"/><span class="w">Mimir</span></div>
  <div class="eye">Library</div>
  <div class="row active"><span class="dot" style="background:#d99366"></span>Characters · 47</div>
  <div class="row"><span class="dot" style="background:#7da265"></span>Places · 23</div>
  <div class="row"><span class="dot" style="background:#c43a4e"></span>Factions · 11</div>
  <div class="row"><span class="dot" style="background:#a07cc8"></span>Cultures · 6</div>
  <div class="row"><span class="dot" style="background:#8d8478"></span>Events · 38</div>
  <div class="eye">Tools</div>
  <div class="row">Timeline</div>
  <div class="row">Family tree</div>
  <div class="row">Ask Mimir</div>
</div>
</div>
<div class="notes">
  Right-edge bound in ember.<br/>
  Top: brand mark + wordmark.<br/>
  Sections divided by hairline rules.<br/>
  Active row: ember-soft fill + 3px ember inset stripe.
</div>
</div></body></html>

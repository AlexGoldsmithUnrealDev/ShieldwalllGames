<!doctype html>
<!-- @dsCard group="Spacing" name="Texture — Grain overlay" subtitle="Single SVG turbulence reused everywhere" viewport="700x210" -->
<html lang="en"><head><meta charset="utf-8"/><title>Texture · grain</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>html,body{margin:0;padding:0;background:var(--bg-page);color:var(--fg-1)}
.f{padding:14px;background:var(--bg-shell);border:1px solid var(--border);border-radius:10px}
.k{font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--fg-3);margin:0 0 10px}
.row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.swatch{aspect-ratio:2;border-radius:6px;border:1px solid var(--border);position:relative;overflow:hidden;display:flex;align-items:flex-end;padding:8px;font-family:var(--font-mono);font-size:11px;color:#d6c9a8}
.swatch::before{content:"";position:absolute;inset:0;background-image:var(--grain-svg);background-size:220px;mix-blend-mode:overlay;pointer-events:none}
.l{position:relative;z-index:1;background:rgba(0,0,0,.45);padding:3px 7px;border-radius:3px}
</style></head>
<body><div class="f">
<div class="k">Grain overlay · the same SVG turbulence, every property</div>
<div class="row">
  <div class="swatch" style="background:#1c1814"><span class="l">--bg-page · 6%</span></div>
  <div class="swatch" style="background:#322b22"><span class="l">--bg-surface · 6%</span></div>
  <div class="swatch" style="background:#7a1f2b"><span class="l">on oxblood · 6%</span></div>
  <div class="swatch" style="background:#efe6cf"><span class="l" style="background:rgba(28,20,10,.55);color:#f7f1e3">vellum · 6%</span></div>
  <div class="swatch" style="background:#b85a2c"><span class="l">on ember · 6%</span></div>
  <div class="swatch" style="background-image:url('../assets/plates/forest.png');background-size:cover;background-position:center"><span class="l">on plate · 6%</span></div>
</div></div></body></html>

<!doctype html>
<!-- @dsCard group="Type" name="Type — Inter" subtitle="UI labels, buttons, dense rows · 13–15px" viewport="700x190" -->
<html lang="en"><head><meta charset="utf-8"/><title>Type — Sans</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>html,body{margin:0;padding:0;background:var(--bg-page);color:var(--fg-1)}
.f{padding:18px 22px;background:var(--bg-shell);border:1px solid var(--border);border-radius:10px;position:relative;overflow:hidden}
.f::before{content:"";position:absolute;inset:0;background-image:var(--grain-svg);background-size:220px 220px;opacity:.5;mix-blend-mode:overlay;pointer-events:none}
.in{position:relative;z-index:1}
.k{font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--fg-3);margin-bottom:10px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.lbl{font-family:var(--font-sans);font-size:13px;font-weight:600;color:var(--fg-2);margin-bottom:4px}
.bd{font-family:var(--font-sans);font-size:15px;line-height:1.55;color:var(--fg-1);margin:0}
.btn{display:inline-flex;align-items:center;padding:8px 14px;font-family:var(--font-sans);font-size:13px;font-weight:600;background:var(--accent);color:var(--fg-on-accent);border-radius:6px;border:none}
.meta{font-family:var(--font-sans);font-size:12px;color:var(--fg-3);margin-top:14px}
</style></head>
<body><div class="f"><div class="in">
<div class="k">Sans — Inter</div>
<div class="row">
  <div><div class="lbl">Aliases</div><p class="bd">The Iron-Crown · Wolf of Kernow</p></div>
  <div><div class="lbl">Action</div><button class="btn">Save entry</button></div>
</div>
<div class="meta">UI labels, buttons, table cells · 13–15px in product · 400 / 500 / 600 / 700</div>
</div></div></body></html>
